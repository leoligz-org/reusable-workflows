name: Build and Release Docker Images

on:
  push:
    # Pattern matched against refs/tags
    tags:        
      - '*'           # Push events to every tag not containing /

  workflow_call:
    secrets:
      REGISTRY_SA:
        required: true
      REGISTRY_PASS:
        required: true
    inputs:
      ghcr:
        description: 'Whether to push to GHCR after build'
        required: true
        default: true
        type: boolean
      private:
        description: 'Whether to push to private registry after build'
        required: true
        default: true
        type: boolean

env:
  IMAGE_NAME: ${{ vars.IMAGE_REGISTRY }}/${{ vars.IMAGE_REPOSITORY }}

jobs:
  build:
    runs-on: [arc-runners-org] # our new runner set
    container:
      image: gcr.io/kaniko-project/executor:debug # the kaniko image
    permissions:
      contents: read # read the repository
      packages: write # push to GHCR, omit if not pushing to GitHub's container registry

    outputs:
      image_name_tag_digest: ${{ steps.build.outputs.image_name_tag_digest }}

    steps:
      - name: Enable All Builds by Default
        if: ${{ github.event.inputs.ghcr == '' }}
        run: |
          echo "INPUT_GHCR=true" >> $GITHUB_ENV
          echo "INPUT_PRIVATE=true" >> $GITHUB_ENV
      - name: Enable Builds According to Input
        if: ${{ github.event.inputs.ghcr != '' }}
        run: |
          set -x
          echo "INPUT_GHCR=${{ inputs.ghcr }}" >> $GITHUB_ENV
          echo "INPUT_PRIVATE=${{ inputs.private }}" >> $GITHUB_ENV

      - name: Build and push container to GHCR and/or private registry
        id: build
        run: |
          set -x
          AUTH_ENTRIES=""
          DEST_ENTRIES=""
          AUTH_SEP="" # Separator for JSON entries (comma)
          DEST_SEP="" # Separator for shell arguments (space)

          # --- 1. Process Registries and Build Delimited Strings ---

          # Handle ghcr.io condition
          if [ "${INPUT_GHCR}" = "true" ]; then
              AUTH_GHCR=$(printf "%s:%s" '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)
              
              AUTH_ENTRIES="${AUTH_ENTRIES}${AUTH_SEP}\"ghcr.io\": {\"auth\": \"${AUTH_GHCR}\"}"
              DEST_ENTRIES="${DEST_ENTRIES}${DEST_SEP}--destination=ghcr.io/${GITHUB_REPOSITORY}/${{ vars.IMAGE_REPOSITORY }}:${{ github.ref_name }}"
              
              AUTH_SEP=","
              DEST_SEP=" "
          fi

          # Handle private registry condition
          if [ "${INPUT_PRIVATE}" = "true" ]; then
              AUTH_PRIVATE=$(printf "%s:%s" '${{ secrets.REGISTRY_SA }}' '${{ secrets.REGISTRY_PASS }}' | base64)

              REGISTRY_DIR=$(dirname "${{ vars.IMAGE_REGISTRY }}")

              AUTH_ENTRIES="${AUTH_ENTRIES}${AUTH_SEP}\"${REGISTRY_DIR}\": {\"auth\": \"${AUTH_PRIVATE}\"}"
              DEST_ENTRIES="${DEST_ENTRIES}${DEST_SEP}--destination=${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
              
              AUTH_SEP=","
              DEST_SEP=" "
          fi

          # --- 2. Write the Docker Config File ---
          # Use printf to construct the full JSON string reliably
          printf '{"auths": {%s}}\n' "$AUTH_ENTRIES" > /kaniko/.docker/config.json

          # --- 3. Configure Git ---
          export GIT_USERNAME="kaniko-bot"
          export GIT_PASSWORD="${{ secrets.GITHUB_TOKEN }}"

          # --- 4. Execute Kaniko Build ---
          # The $DEST_ENTRIES variable is unquoted here, so the shell performs word splitting
          # based on the spaces we used as separators, passing each --destination flag correctly.

          /kaniko/executor --dockerfile="Dockerfile" \
            --context="${{ github.repositoryUrl }}#${{ github.ref }}#${{ github.sha }}" \
            $DEST_ENTRIES \
            --push-retry 5 \
            --image-name-tag-with-digest-file /workspace/image-digest.txt

          echo "image_name_tag_digest=$(grep -o ^${{ env.IMAGE_NAME }}.*\$ /workspace/image-digest.txt)" >> "$GITHUB_OUTPUT"

  sign:
    if: ${{ needs.build.outputs.image_name_tag_digest }} != 'image_name_tag_digest='
    runs-on: [arc-runners-org]
    needs: build
    steps:
      - uses: leoligz-org/reusable-workflows/.github/actions/cache@feat/workflow-call

      - name: Cosign image signing
        run: |
          /home/runner/bin/cosign login $(dirname ${{ vars.IMAGE_REGISTRY }}) -u '${{ secrets.REGISTRY_SA }}' -p '${{ secrets.REGISTRY_PASS }}'
          /home/runner/bin/cosign sign --key k8s://arc-runners/cosign ${{ needs.build.outputs.image_name_tag_digest }}

      - name: Cosign image signing verifying
        run: |
          /home/runner/bin/cosign verify --key k8s://arc-runners/cosign ${{ needs.build.outputs.image_name_tag_digest }}
